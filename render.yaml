services:
  - type: web
    name: opendownload
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: opendownload-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "2"

databases:
  - name: opendownload-db
    plan: free
    databaseName: opendownload
    ipAllowList: []
